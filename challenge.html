<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Day Communication Challenge - Learn with MKVK</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .day-card {
            background: var(--white);
            padding: 2rem 1rem;
            border-radius: 0.75rem;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        .day-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }
        .day-card.completed {
            background: #dcfce7;
            border-color: #22c55e;
        }
        .day-card.completed h3 {
            color: #166534;
        }
        .day-card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .day-card .status {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-light);
        }
        .day-card.completed .status {
            color: #166534;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Learn with <span>MKVK</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="learn.html">Learn</a></li>
                <li><a href="challenge.html">30-Day Challenge</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="challenge-header" style="padding: 4rem 0; text-align: center; background-color: var(--white);">
            <div class="container">
                <h1>30-Day Beginner Challenge</h1>
                <p>One small task every day to transform your communication skills.</p>
                <div class="progress-container" style="max-width: 600px; margin: 2rem auto;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Your Progress</span>
                        <span id="progress-text">0/30 Days</span>
                    </div>
                    <div style="background: #e5e7eb; border-radius: 1rem; height: 1rem; overflow: hidden;">
                        <div id="progress-bar" style="background: var(--primary); height: 100%; width: 0%; transition: width 0.5s ease;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="challenge-grid-section" style="padding: 4rem 0;">
            <div class="container">
                <div class="challenge-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem;" id="challenge-grid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- Task Modal -->
    <div id="task-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: var(--white); padding: 2.5rem; border-radius: 1rem; max-width: 500px; width: 90%; position: relative;">
            <span id="close-modal" style="position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.5rem;">&times;</span>
            <h2 id="modal-title" style="margin-bottom: 1rem; color: var(--primary);">Day X Task</h2>
            <div id="modal-content" style="margin-bottom: 2rem; font-size: 1.1rem;">
                Task description goes here.
            </div>
            <button id="complete-task" class="btn btn-primary" style="width: 100%;">Mark as Completed</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Learn with MKVK. Elevate your voice.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
